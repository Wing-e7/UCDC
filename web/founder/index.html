<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Founder Mission Control</title>
  <style>
    :root {
      --bg: #070b12;
      --panel: #10182a;
      --text: #e6f0ff;
      --muted: #95a7c3;
      --border: #243451;
      --accent: #5ad0ff;
      --ok: #8cf5bf;
      --warn: #ffd58a;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(1000px 450px at 90% -20%, rgba(90, 208, 255, 0.15), transparent),
        radial-gradient(1200px 500px at 5% -20%, rgba(159, 123, 255, 0.18), transparent),
        var(--bg);
    }
    main { max-width: 1100px; margin: 0 auto; padding: 1.2rem 1rem 2.5rem; }
    .hero {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #10192c;
      padding: 0.9rem 1rem;
      margin-bottom: 0.8rem;
    }
    h1 { margin: 0; font-size: 1.4rem; }
    .sub { margin: 0.35rem 0 0; color: var(--muted); font-size: 0.9rem; }
    .row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.7rem; }
    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #15213a;
      color: var(--text);
      padding: 0.42rem 0.68rem;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn.primary { background: #13314a; border-color: rgba(90, 208, 255, 0.45); }
    .grid { display: grid; gap: 0.7rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 0.7rem;
    }
    .label { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .value { font-size: 1.45rem; font-weight: 700; margin-top: 0.12rem; }
    .section {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 0.8rem;
      margin-top: 0.8rem;
    }
    .section h2 { margin: 0 0 0.45rem; font-size: 0.86rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .health { color: var(--ok); font-size: 0.86rem; }
    .health.warn { color: var(--warn); }
    .feed { max-height: 280px; overflow: auto; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem; background: #0c1424; }
    .item { font-size: 0.77rem; border-bottom: 1px solid rgba(36, 52, 81, 0.55); padding: 0.27rem 0; }
    .item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Founder Mission Control</h1>
      <p class="sub">High-level local view for installs, Trust Pacts, Mission Board activity, and Kill Switch behavior.</p>
      <div class="row">
        <a class="btn primary" href="/ui/">Open Onboarding Console</a>
        <button type="button" class="btn" id="refresh">Refresh Dashboard</button>
      </div>
    </section>

    <div class="grid">
      <div class="card"><div class="label">Local installs</div><div class="value" id="installs">0</div></div>
      <div class="card"><div class="label">Trust Pacts</div><div class="value" id="pacts">0</div></div>
      <div class="card"><div class="label">Missions launched</div><div class="value" id="missions">0</div></div>
      <div class="card"><div class="label">Kill Switch triggers</div><div class="value" id="kills">0</div></div>
    </div>

    <section class="section">
      <h2>Service Health</h2>
      <div id="health" class="health">Checking...</div>
    </section>

    <section class="section">
      <h2>Recent Mission Feed</h2>
      <div id="feed" class="feed"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function loadStats() {
      let stats = { installs: 0, trustPacts: 0, missions: 0, kills: 0 };
      try {
        stats = { ...stats, ...JSON.parse(localStorage.getItem("ucdc_mc_stats") || "{}") };
      } catch (_) {}
      $("installs").textContent = String(stats.installs || 0);
      $("pacts").textContent = String(stats.trustPacts || 0);
      $("missions").textContent = String(stats.missions || 0);
      $("kills").textContent = String(stats.kills || 0);
    }

    function loadFeed() {
      let events = [];
      try {
        events = JSON.parse(localStorage.getItem("ucdc_mc_events") || "[]");
      } catch (_) {}
      const feed = $("feed");
      if (!Array.isArray(events) || !events.length) {
        feed.innerHTML = '<div class="item">No events yet. Use onboarding console to generate activity.</div>';
        return;
      }
      feed.innerHTML = events.slice(0, 40).map((e) => (
        '<div class="item"><strong>' + (e.stamp || "--:--") + '</strong> · ' + (e.type || "event") + '<br>' + (e.details || "") + '</div>'
      )).join("");
    }

    async function refreshHealth() {
      const consentBase = localStorage.getItem("ucdc_consent_base") || "http://127.0.0.1:8001";
      const orchBase = localStorage.getItem("ucdc_orch_base") || "http://127.0.0.1:8002";
      let consent = "down";
      let orch = "down";
      try { if ((await fetch(consentBase.replace(/\/$/, "") + "/health")).ok) consent = "ok"; } catch (_) {}
      try { if ((await fetch(orchBase.replace(/\/$/, "") + "/health")).ok) orch = "ok"; } catch (_) {}
      const line = "Consent: " + consent.toUpperCase() + " | Orchestrator: " + orch.toUpperCase();
      const el = $("health");
      el.textContent = line;
      el.className = "health" + (consent === "ok" && orch === "ok" ? "" : " warn");
    }

    async function refreshAll() {
      loadStats();
      loadFeed();
      await refreshHealth();
    }

    $("refresh").addEventListener("click", () => refreshAll());
    refreshAll();
  </script>
</body>
</html>
